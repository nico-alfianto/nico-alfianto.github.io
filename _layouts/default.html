<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ site.title }}</title>

  {% seo %}

  <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
</head>

<body>

<div class="wrapper">

  <!-- =========================
       SIDEBAR (PRO CARD)
  ========================== -->
  <header>

    {% if site.logo %}
    <img src="{{ site.logo | relative_url }}" alt="Profile" class="profile-img">
    {% endif %}

    <h1>{{ site.title }}</h1>

    <p class="sidebar-desc">
      Information Systems Student<br>
      Data Analyst | System Designer | BI Enthusiast
    </p>

    <!-- MENU -->
    <nav class="sidebar-menu">

      <a class="badge {% if page.url == '/' %}active{% endif %}" href="/">
        Home
      </a>

      <a class="badge {% if page.url contains 'portfolio' %}active{% endif %}" href="/portfolio">
        Portfolio
      </a>

      <a class="badge {% if page.url contains 'cv' %}active{% endif %}" href="/cv">
        CV
      </a>

      <a class="badge {% if page.url contains 'articles' %}active{% endif %}" href="/articles">
        Articles
      </a>

    </nav>

  </header>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <section>
    {{ content }}
  </section>

</div>

</body>
</html>
